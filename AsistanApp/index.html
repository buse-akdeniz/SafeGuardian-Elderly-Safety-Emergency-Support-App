<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaGuard - Temiz Arayüz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a237e;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0;
            overflow-y: auto;
        }

        /* ========== EN ÜSTTE: SAATİ GÖSTER ========== */
        .clock-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
            min-height: 150px;
        }

        .time {
            font-size: 80px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            font-family: 'Courier New', monospace;
            letter-spacing: 5px;
        }

        .greeting {
            font-size: 40px;
            color: #ffd700;
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* ========== ORTA BÖLGE: DİNAMİK GÖREV ========== */
        .middle-zone {
            flex: 1 1 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-color: #1a237e;
            overflow: hidden;
        }

        .task-card {
            background: white;
            border-radius: 30px;
            padding: 28px 30px;
            text-align: center;
            width: 90%;
            max-width: 560px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: none;
            animation: slideIn 0.5s ease-out;
        }

        .task-card.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-card.medication {
            background: linear-gradient(135deg, #fff8e1 0%, #ffe082 100%);
        }

        .task-card.health-check {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
        }

        .task-title {
            font-size: 40px;
            color: #d32f2f;
            font-weight: bold;
            margin-bottom: 12px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .task-description {
            font-size: 30px;
            color: #1a237e;
            font-weight: bold;
            margin-bottom: 14px;
        }

        .task-icon {
            font-size: 64px;
            margin-bottom: 14px;
        }

        .hidden-status {
            font-size: 24px;
            color: #1a237e;
            opacity: 0.7;
            font-weight: 600;
        }

        /* ========== EN ALTTA: DEV BUTONLAR ========== */
        .button-zone {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
            min-height: 120px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .btn-main {
            flex: 1;
            min-width: 160px;
            padding: 22px 20px;
            font-size: 32px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-main:active {
            transform: scale(0.95);
        }

        .btn-confirm {
            background-color: #4caf50;
            color: white;
        }

        .btn-confirm:hover {
            background-color: #45a049;
            box-shadow: 0 15px 40px rgba(76, 175, 80, 0.4);
        }

        .btn-skip {
            background-color: #ff9800;
            color: white;
            font-size: 35px;
        }

        .btn-skip:hover {
            background-color: #fb8c00;
            box-shadow: 0 15px 40px rgba(255, 152, 0, 0.4);
        }

        .btn-help {
            background-color: #f44336;
            color: white;
            font-size: 35px;
        }

        .btn-help:hover {
            background-color: #da190b;
            box-shadow: 0 15px 40px rgba(244, 67, 54, 0.4);
        }

        /* ========== DÜŞ ALGILAMA (ACİL EKRAN) ========== */
        .emergency-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #d32f2f;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: pulse 0.5s infinite;
        }

        .emergency-screen.active {
            display: flex;
        }

        @keyframes pulse {
            0%, 100% {
                background-color: #d32f2f;
            }
            50% {
                background-color: #ff1744;
            }
        }

        .emergency-text {
            font-size: 80px;
            font-weight: bold;
            color: white;
            text-align: center;
            margin-bottom: 40px;
            animation: bounce 0.6s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .emergency-button {
            padding: 60px 80px;
            font-size: 50px;
            background-color: white;
            color: #d32f2f;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        /* ========== MOBİL REZPONSİVLİK ========== */
        @media (max-width: 600px) {
            .time {
                font-size: 60px;
            }

            .greeting {
                font-size: 30px;
            }

            .task-title {
                font-size: 45px;
            }

            .task-description {
                font-size: 32px;
            }

            .btn-main {
                font-size: 35px;
                padding: 30px 20px;
                min-height: 120px;
            }

            .task-card {
                padding: 40px 25px;
            }
        }

        /* ========== DURUM ÇUBUĞU ========== */
        .status-bar {
            position: fixed;
            top: 0;
            right: 0;
            padding: 15px 20px;
            background-color: rgba(26, 35, 126, 0.9);
            color: white;
            font-size: 28px;
            font-weight: bold;
            z-index: 100;
            border-radius: 0 0 0 15px;
        }

        .language-switcher {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 120;
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            border: none;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.92);
            color: #1a237e;
        }

        .accessibility-tools {
            position: fixed;
            top: 52px;
            left: 10px;
            z-index: 120;
            display: flex;
            gap: 8px;
        }

        .a11y-btn {
            border: none;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.92);
            color: #1a237e;
        }

        body.large-text {
            font-size: 112%;
        }

        body.high-contrast {
            filter: contrast(1.2) saturate(0.8);
        }

        .status-online {
            color: #4caf50;
        }

        .status-offline {
            color: #ff9800;
        }

        .status-battery {
            margin-left: 20px;
        }

        .status-battery.critical {
            color: #d32f2f;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>

<!-- DURUM ÇUBUĞU -->
<div class="status-bar">
    <span id="connectionStatus" class="status-online">🌐 Online</span>
    <span id="batteryStatus" class="status-battery">🔋 100%</span>
</div>

<div class="language-switcher">
    <button class="lang-btn" onclick="changeLanguage('tr')">TR</button>
    <button class="lang-btn" onclick="changeLanguage('en')">EN</button>
    <button class="lang-btn" onclick="changeLanguage('de')">DE</button>
</div>

<div class="accessibility-tools">
    <button class="a11y-btn" onclick="toggleLargeText()">A+ Yazı</button>
    <button class="a11y-btn" onclick="toggleHighContrast()">Kontrast</button>
</div>

<!-- SAATİ GÖSTER BÖLGESI -->
<div class="clock-zone">
    <div class="time" id="clock">14:30</div>
    <div class="greeting">👋 Merhaba Ahmet Amca</div>
</div>

<!-- DİNAMİK GÖREV BÖLGESI -->
<div class="middle-zone">
    <div class="task-card medication active">
        <div class="task-icon">💊</div>
        <div class="task-title" data-i18n="medication">İLAÇ VAKTİ!</div>
        <div class="task-description" data-i18n="medication_desc">Tansiyon İlacı</div>
        <div class="hidden-status" data-i18n="medication_desc">Şimdi almanız gerekiyor</div>
    </div>

    <div class="task-card health-check">
        <div class="task-icon">🩺</div>
        <div class="task-title" data-i18n="health_check">SAĞLIK KONTROLÜ</div>
        <div class="task-description" data-i18n="health_check_desc">Şeker Ölçümü</div>
        <div class="hidden-status" data-i18n="health_check_desc">Lütfen şekerinizi ölçün</div>
    </div>

    <div class="task-card" id="noTaskMessage" style="text-align: center; color: #ffd700; font-size: 40px; font-weight: bold;">
        💤 <span data-i18n="no_task">Şu an görev yok</span><br>
        <span style="font-size: 30px; opacity: 0.8;" data-i18n="rest_time">Rahatça bekleyebilirsiniz</span>
    </div>
</div>

<!-- BUTONLAR BÖLGESI -->
<div class="button-zone">
    <button class="btn-main btn-confirm" id="confirmBtn" onclick="completeTask()">✅ <span data-i18n="btn_confirm">İÇTİM</span></button>
    <button class="btn-main btn-skip" id="skipBtn" onclick="skipTask()">⏭️ <span data-i18n="btn_skip">SONRA</span></button>
    <button class="btn-main btn-help" id="helpBtn" onclick="triggerEmergency()">🆘 <span data-i18n="btn_help">YARDIM</span></button>
    <button class="btn-main" style="background: linear-gradient(135deg, #4caf50 0%, #45a049 100%); margin-top: 15px;" 
            onclick="window.location.href='/elderly-signup.html'">📝 YENİ KAYDOL</button>
    <button style="padding: 14px 24px; font-size: 22px; font-weight: 600; border: none; border-radius: 12px; background: #ffffff; color: #1a237e; cursor: pointer; margin-top: 10px;"
            onclick="window.open('/privacy-policy.html', '_blank')">
        Privacy Policy
    </button>
</div>

<!-- ACİL DURUM EKRANI -->
<div class="emergency-screen" id="emergencyScreen">
    <div class="emergency-text" data-i18n="help_coming">YARDIM GELİYOR!</div>
    <button class="emergency-button" onclick="closeEmergency()">✓</button>
</div>

<!-- SignalR & Voice Recognition -->
<script src="/js/signalr.min.js"></script>

<!-- Localization (i18n) -->
<script src="/js/i18n.js"></script>

<!-- AI Emergency Protocol -->
<script src="/js/ai-emergency.js"></script>
<script>
    let currentTaskIndex = 0;
    let isListening = false;
    let connection = null;

    function changeLanguage(lang) {
        if (typeof setLanguage === 'function') {
            setLanguage(lang);
        }
    }

    function toggleLargeText() {
        document.body.classList.toggle('large-text');
        localStorage.setItem('a11y_large_text', document.body.classList.contains('large-text') ? '1' : '0');
    }

    function toggleHighContrast() {
        document.body.classList.toggle('high-contrast');
        localStorage.setItem('a11y_high_contrast', document.body.classList.contains('high-contrast') ? '1' : '0');
    }

    // ========== OTOMATIK GİRİŞ KONTROL (Yaşlı Self-Enrollment) ==========
    function checkAutoLogin() {
        const deviceId =
            localStorage.getItem('elderly_device_id') ||
            localStorage.getItem('lastDeviceId') ||
            sessionStorage.getItem('auto_login_device');
        if (deviceId) {
            // Otomatik olarak giriş yaptı, kullanıcı verilerini yükle
            const userData = localStorage.getItem(`elderly_${deviceId}`);
            if (userData) {
                const user = JSON.parse(userData);
                const displayName = user.fullName || user.name || 'Kullanıcı';
                console.log('✅ Otomatik giriş başarılı:', displayName);
                document.querySelector('.greeting').textContent = `👋 Merhaba ${displayName}`;
                
                // Subscription kontrolü yap
                if (user.token) {
                    fetch(`/api/subscription`, {
                        headers: {
                            'Authorization': `Bearer ${user.token}`
                        }
                    })
                        .then(r => r.json())
                        .then(data => {
                            if (data.success || data.plan) {
                                console.log('📋 Abonelik yüklendi:', data.plan || data.subscription.plan);
                            }
                        });
                }
            }
        }
    }

    // Sayfa yüklendiğinde otomatik giriş kontrolü yap
    window.addEventListener('load', () => {
        checkAutoLogin();
        if (localStorage.getItem('a11y_large_text') === '1') {
            document.body.classList.add('large-text');
        }
        if (localStorage.getItem('a11y_high_contrast') === '1') {
            document.body.classList.add('high-contrast');
        }
    });

    // ========== MİKROFON İZNİ (İLK AÇILIŞ) ==========
    async function requestMicrophonePermission() {
        const permissionKey = 'mic_permission_requested';
        if (localStorage.getItem(permissionKey) === 'true') return;
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(track => track.stop());
        } catch (error) {
            console.warn('Mikrofon izni verilmedi veya alınamadı:', error);
        } finally {
            localStorage.setItem(permissionKey, 'true');
        }
    }

    window.addEventListener('load', requestMicrophonePermission);

    // ========== SAATİ GÜNCELLE ===========
    function updateClock() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('clock').textContent = `${hours}:${minutes}`;
    }

    setInterval(updateClock, 1000);
    updateClock();

    function getPendingQueue() {
        try {
            return JSON.parse(localStorage.getItem('offline_api_queue') || '[]');
        } catch {
            return [];
        }
    }

    function setPendingQueue(items) {
        localStorage.setItem('offline_api_queue', JSON.stringify(items));
    }

    function queueApiRequest(url, options) {
        const queue = getPendingQueue();
        queue.push({ url, options, queuedAt: new Date().toISOString() });
        setPendingQueue(queue);
    }

    async function postWithOfflineQueue(url, payload, extraHeaders = {}) {
        const options = {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...extraHeaders },
            body: JSON.stringify(payload)
        };

        if (!navigator.onLine) {
            queueApiRequest(url, options);
            return { queued: true };
        }

        try {
            const res = await fetch(url, options);
            if (!res.ok) {
                queueApiRequest(url, options);
                return { queued: true };
            }
            return { queued: false };
        } catch {
            queueApiRequest(url, options);
            return { queued: true };
        }
    }

    async function flushOfflineQueue() {
        const queue = getPendingQueue();
        if (!queue.length || !navigator.onLine) return;

        const remaining = [];
        for (const item of queue) {
            try {
                const res = await fetch(item.url, item.options);
                if (!res.ok) remaining.push(item);
            } catch {
                remaining.push(item);
            }
        }

        setPendingQueue(remaining);
        if (queue.length > remaining.length) {
            console.log(`✅ Offline kuyruktan ${queue.length - remaining.length} işlem senkronlandı.`);
        }
    }

    // ========== GÖREV TAMAMLA ==========
    async function completeTask() {
        console.log('✅ Görev tamamlandı');
        speak('Aferin Ahmet Amca, ilacını not aldım. Sağlıklı kalın.');
        rotateTask();
        
        // Sunucuya gönder
        const result = await postWithOfflineQueue('/api/complete-task', {
            taskId: 't1',
            method: 'button',
            elderlyId: 'elderly-001'
        });

        if (result.queued) {
            speak('İnternet yok. Görev kaydedildi, bağlantı gelince gönderilecek.');
        }
    }

    // ========== GÖREVI ATLA ==========
    function skipTask() {
        console.log('⏭️ Görev atlandı');
        speak('Tamam, daha sonra hatırlatırım.');
        rotateTask();
    }

    // ========== ACİL DURUM ==========
    async function triggerEmergency() {
        console.log('🆘 Acil durum tetiklendi');
        const emergency = document.getElementById('emergencyScreen');
        emergency.classList.add('active');
        speak('Aileni aradığımızı duydu. Yardım geliyor!', true);

        const storedUser = localStorage.getItem('elderly_user');
        let token = '';
        if (storedUser) {
            try {
                token = JSON.parse(storedUser)?.token || '';
            } catch {}
        }

        const headers = { 'Content-Type': 'application/json' };
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }

        const result = await postWithOfflineQueue('/api/emergency-alert', {
            alertType: 'emergency_call'
        }, token ? { 'Authorization': `Bearer ${token}` } : {});

        if (result.queued) {
            speak('İnternet yok. Acil bildirim kuyrukta, bağlantı gelir gelmez gönderilecek.', true);
        }

        // 30 saniye sonra otomatik kapat
        setTimeout(() => {
            closeEmergency();
        }, 30000);
    }

    function closeEmergency() {
        document.getElementById('emergencyScreen').classList.remove('active');
    }

    // ========== GÖREV DÖNGÜSÜ ==========
    function rotateTask() {
        const tasks = document.querySelectorAll('.task-card:not(#noTaskMessage)');
        const noTaskMsg = document.getElementById('noTaskMessage');
        
        tasks.forEach(t => t.classList.remove('active'));
        noTaskMsg.classList.remove('active');
        
        currentTaskIndex++;

        if (currentTaskIndex < tasks.length) {
            tasks[currentTaskIndex].classList.add('active');
        } else {
            // Tüm görevler bittiğinde boş kartı göster
            noTaskMsg.classList.add('active');
            console.log('✅ Tüm görevler tamamlandı.');
        }
    }

    // ========== SES SİNTEZİ (TTS) ==========
    function speak(text, isUrgent = false) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'tr-TR';
        utterance.rate = 0.9;
        utterance.pitch = isUrgent ? 1.3 : 1.0;
        speechSynthesis.speak(utterance);
    }

    // ========== SES TANIMA (SPEECH RECOGNITION) ==========
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let recognitionStarted = false;
    
    function startSpeechRecognition() {
        if (!recognitionStarted && SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                console.log('🎤 Dinleme başladı');
            };

            recognition.onresult = (event) => {
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript.toLowerCase();
                    console.log('Söylenen:', transcript);

                    if (transcript.includes('evet') || transcript.includes('tamam') || transcript.includes('aldım') || transcript.includes('içtim')) {
                        completeTask();
                    } else if (transcript.includes('sonra') || transcript.includes('bekle')) {
                        skipTask();
                    } else if (transcript.includes('yardım') || transcript.includes('imdad') || transcript.includes('acil')) {
                        triggerEmergency();
                    }
                }
            };

            recognition.onerror = (event) => {
                console.error('Ses tanıma hatası:', event.error);
            };

            try {
                recognition.start();
                recognitionStarted = true;
                console.log('🎤 Ses tanıma başlatıldı.');
            } catch (e) {
                console.warn('Ses tanıma başlatılamadı:', e);
            }
        }
    }
    
    // Kullanıcı ekrana dokunduğunda veya tıkladığında ses dinlemeyi başlat
    document.addEventListener('click', startSpeechRecognition, { once: true });
    document.addEventListener('touchstart', startSpeechRecognition, { once: true });

    // ========== BAĞLANTI DURUMU ==========
    window.addEventListener('online', () => {
        document.getElementById('connectionStatus').textContent = '🌐 Online';
        document.getElementById('connectionStatus').className = 'status-online';
        speak('İnternet bağlantınız sağlandı.');
        flushOfflineQueue();
    });

    window.addEventListener('offline', () => {
        document.getElementById('connectionStatus').textContent = '📡 Offline';
        document.getElementById('connectionStatus').className = 'status-offline';
        speak('İnternet bağlantınız kesildi. Verileri yerel olarak kaydediyorum.', true);
    });

    window.addEventListener('load', flushOfflineQueue);

    // ========== SIGNALR BAĞ LANTISI ==========
    connection = new signalR.HubConnectionBuilder()
        .withUrl('/health-hub')
        .withAutomaticReconnect()
        .build();

    connection.on('ReceiveTaskUpdate', (data) => {
        console.log('📝 Görev güncellemesi:', data);
        speak(`Yeni görev: ${data.taskId}`);
    });

    connection.on('ReceiveHealthUpdate', (data) => {
        console.log('💓 Sağlık güncellemesi:', data);
    });

    connection.on('ReceiveEmergencyAlert', (data) => {
        console.log('🚨 Acil uyarı:', data);
        triggerEmergency();
    });

    connection.start().catch(err => {
        console.error('SignalR bağlantı hatası:', err);
    });

    // ========== PĠLĠ TAKĠP ET ==========
    if ('getBattery' in navigator) {
        navigator.getBattery().then(battery => {
            function updateBattery() {
                const level = Math.round(battery.level * 100);
                const status = document.getElementById('batteryStatus');
                status.textContent = `🔋 ${level}%`;

                if (level <= 15) {
                    status.classList.add('critical');
                    speak(`Telefonunun şarjı ${level} yüzde. Lütfen şarj edin.`, true);
                } else {
                    status.classList.remove('critical');
                }
            }

            battery.addEventListener('levelchange', updateBattery);
            updateBattery();
        });
    }

    // ========== DÜŞME ALGILAMA ==========
    if ('DeviceMotionEvent' in window) {
        window.addEventListener('devicemotion', async (event) => {
            const acc = event.accelerationIncludingGravity;
            const total = Math.sqrt(acc.x * acc.x + acc.y * acc.y + acc.z * acc.z);

            if (total > 25) {
                console.log('🚨 Olası düşme algılandı!');
                // Use AI Protocol for fall detection
                await aiProtocol.detectFall(total);
            }
        });
    }

    // SignalR AI Events
    connection.on('ReceiveAICritical', (data) => {
        console.log('🚨 AI Critical Alert:', data);
        triggerEmergency();
    });

    connection.on('ReceiveEmergencyEscalation', (data) => {
        console.log('📢 Emergency Escalation:', data);
        document.getElementById('emergencyScreen').classList.add('active');
    });

    connection.on('ReceiveEmergencyBroadcast', (data) => {
        console.log('📢 Emergency Broadcast:', data);
        // Show critical status
        speak(t('help_coming'), true);
    });

    connection.on('ReceiveAlertCancelled', (data) => {
        console.log('✅ Alert Cancelled:', data);
        document.getElementById('emergencyScreen').classList.remove('active');
    });

    console.log('✅ VitaGuard başladı - Temiz Arayüz + AI');
    speak('Merhaba Ahmet Amca. Asistanınız aktif. Size nasıl yardımcı olabilirim?');
</script>

</body>
</html>
