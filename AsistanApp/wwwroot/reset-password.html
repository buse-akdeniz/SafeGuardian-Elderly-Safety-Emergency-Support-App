<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SafeGuardian Şifre Yenileme</title>
  <style>
    body{font-family:system-ui,sans-serif;background:#f3f7f5;margin:0;padding:24px;color:#17332b}
    main{max-width:440px;margin:8vh auto;background:#fff;padding:28px;border-radius:18px;box-shadow:0 12px 40px #17332b18}
    input,button{box-sizing:border-box;width:100%;padding:14px;margin-top:12px;border-radius:10px;font-size:16px}
    input{border:1px solid #adc7bd}button{border:0;background:#087f5b;color:#fff;font-weight:700}
    #status{min-height:24px;margin-top:14px}
  </style>
</head>
<body>
<main>
  <h1>Yeni şifre / New password</h1>
  <form id="form">
    <input id="password" type="password" minlength="10" autocomplete="new-password" placeholder="Yeni şifre" required>
    <input id="confirm" type="password" minlength="10" autocomplete="new-password" placeholder="Şifre tekrar" required>
    <button type="submit">Şifreyi güncelle</button>
  </form>
  <p id="status" role="status"></p>
</main>
<script>
const params=new URLSearchParams(location.search),status=document.getElementById('status');
document.getElementById('form').addEventListener('submit',async e=>{
  e.preventDefault();
  const password=document.getElementById('password').value;
  if(password!==document.getElementById('confirm').value){status.textContent='Şifreler eşleşmiyor.';return;}
  const response=await fetch('/api/elderly/reset-password/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:params.get('email'),token:params.get('token'),newPassword:password})});
  const data=await response.json().catch(()=>({}));
  status.textContent=response.ok?'Şifreniz güncellendi. Uygulamadan giriş yapabilirsiniz.':(data.message||'İşlem başarısız.');
});
</script>
</body>
</html>
