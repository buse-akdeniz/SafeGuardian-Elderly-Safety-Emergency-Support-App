<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SafeGuardian - Bağlantı Sıfırlama</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background:#0f172a; color:#fff; display:flex; min-height:100vh; align-items:center; justify-content:center; margin:0; }
    .card { width:min(560px,92vw); background:#111827; border:1px solid #334155; border-radius:14px; padding:24px; }
    h1 { font-size:22px; margin:0 0 10px; }
    p { opacity:.9; }
    .ok { color:#86efac; }
    .err { color:#fca5a5; }
    .muted { opacity:.8; font-size:14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Bağlantı Sıfırlanıyor...</h1>
    <p id="status">Önbellek ve eski ayarlar temizleniyor.</p>
    <p class="muted">İşlem bitince otomatik giriş ekranına yönlendirileceksiniz.</p>
  </div>

  <script>
    (async function () {
      const status = document.getElementById('status');
      const log = (t, ok=true) => {
        status.className = ok ? 'ok' : 'err';
        status.textContent = t;
      };

      try {
        localStorage.removeItem('apiBaseUrl');
        localStorage.removeItem('token');
        sessionStorage.removeItem('apiBaseUrl');
        sessionStorage.removeItem('token');

        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }

        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }

        log('Temizleme tamamlandı. Giriş sayfasına yönlendiriliyor...', true);
        setTimeout(() => {
          location.replace('/elderly-ui/index.html?fresh=1&t=' + Date.now());
        }, 900);
      } catch (e) {
        console.error(e);
        log('Temizleme sırasında hata oldu. Manuel temizleme gerekir.', false);
      }
    })();
  </script>
</body>
</html>
