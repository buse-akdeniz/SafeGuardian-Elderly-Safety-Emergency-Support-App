<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yaşlı Yakınız - Aile Kontrol Paneli</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            max-width: 500px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: none;
        }

        .login-container.active {
            display: block;
        }

        .dashboard-container {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
        }

        .dashboard-container.active {
            display: block;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 36px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 18px;
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #667eea;
            border-radius: 10px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #764ba2;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        .logout-btn {
            background: #ff6b6b;
            margin-top: 20px;
            margin-bottom: 0;
        }

        /* DASHBOARD STYLES */
        .dashboard-header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .elderly-info h2 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }

        .elderly-info p {
            font-size: 18px;
            color: #666;
            margin: 5px 0;
        }

        .status-badge {
            background: #4ade80;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 700;
        }

        .status-badge.warning {
            background: #fbbf24;
        }

        .status-badge.critical {
            background: #f87171;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .card h3 {
            font-size: 22px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .medication-item {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .medication-name {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .medication-time {
            font-size: 16px;
            color: #666;
        }

        .medication-status {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .medication-status.taken {
            background: #d1fae5;
            color: #065f46;
        }

        .medication-status.pending {
            background: #fef3c7;
            color: #92400e;
        }

        .notification {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            font-size: 15px;
        }

        .notification.info {
            background: #dbeafe;
            color: #1e40af;
        }

        .notification.warning {
            background: #fef3c7;
            color: #92400e;
            border-left-color: #fbbf24;
        }

        .notification.critical {
            background: #fee2e2;
            color: #991b1b;
            border-left-color: #f87171;
        }

        .time-stamp {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 18px;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .alert.error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #f87171;
        }

        .alert.success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #4ade80;
        }

        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- GİRİŞ EKRANI -->
    <div class="login-container active" id="loginContainer">
        <h1>👨‍👩‍👧 Aile Kontrol Paneli</h1>
        <p style="text-align: center; color: #666; margin-bottom: 30px; font-size: 16px;">
            Yaşlı yakınızın ilaç alımını ve günlük durumunu buradan takip edebilirsiniz.
        </p>

        <div id="loginAlert" class="alert error" style="display: none;"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="familyEmail">E-Posta (Aile Üyesi)</label>
                <input type="email" id="familyEmail" placeholder="Örn: ali@example.com" required>
            </div>

            <div class="form-group">
                <label for="familyPassword">Şifre</label>
                <input type="password" id="familyPassword" placeholder="••••••" required>
            </div>

            <button type="submit">Giriş Yap</button>

            <p style="text-align: center; color: #666; margin-top: 20px; font-size: 14px;">
                Test: ali@example.com / 1234
            </p>
        </form>
    </div>

    <!-- DASHBOARD EKRANI -->
    <div class="dashboard-container" id="dashboardContainer">
        <div class="dashboard-header">
            <div class="elderly-info">
                <h2 id="elderlyName">Ayşe Hanım</h2>
                <p>👤 Yaş: <span id="elderlyAge">75</span></p>
                <p>📞 Tel: <span id="elderlyPhone">+90 555 123 4567</span></p>
            </div>
            <div style="text-align: right;">
                <div id="elderlyStatus" class="status-badge">Iyi ✓</div>
                <button class="logout-btn" onclick="logout()">Çıkış Yap</button>
            </div>
        </div>

        <!-- İLAÇ TAKIP -->
        <div class="card">
            <h3>💊 Bugünün İlaçları</h3>
            <div id="medicationsContainer" class="empty-state">
                Ilaç yükleniyor...
            </div>
        </div>

        <!-- BİLDİRİMLER -->
        <div class="card">
            <h3>🔔 Son Bildirimler</h3>
            <div id="notificationsContainer" class="empty-state">
                Bildirim yükleniyor...
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5007/api';
        let familyToken = null;
        let elderlyId = null;

        // GİRİŞ YÖNETIMI
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('familyEmail').value;
            const password = document.getElementById('familyPassword').value;

            try {
                const response = await fetch(`${API_BASE}/family/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    familyToken = data.token;
                    elderlyId = data.caringFor;
                    
                    localStorage.setItem('familyToken', familyToken);
                    localStorage.setItem('elderlyId', elderlyId);
                    
                    showDashboard();
                } else {
                    showError('Giriş başarısız. E-posta ve şifrenizi kontrol edin.');
                }
            } catch (error) {
                console.error('Giriş hatası:', error);
                showError('Bağlantı hatası');
            }
        });

        function showDashboard() {
            document.getElementById('loginContainer').classList.remove('active');
            document.getElementById('dashboardContainer').classList.add('active');
            loadDashboard();
        }

        async function loadDashboard() {
            try {
                const response = await fetch(`${API_BASE}/family/dashboard/${elderlyId}?token=${familyToken}`);
                
                if (response.ok) {
                    const data = await response.json();
                    renderDashboard(data);
                    
                    // Her 30 saniyede yenile
                    setTimeout(loadDashboard, 30000);
                }
            } catch (error) {
                console.error('Dashboard hatası:', error);
            }
        }

        function renderDashboard(data) {
            // Yaşlı bilgileri
            document.getElementById('elderlyName').textContent = data.elderly.name;
            document.getElementById('elderlyAge').textContent = data.elderly.age;
            document.getElementById('elderlyPhone').textContent = data.elderly.phone;

            // İlaçlar
            const medsContainer = document.getElementById('medicationsContainer');
            if (data.todayMedications.length === 0) {
                medsContainer.innerHTML = '<div class="empty-state">Bugün için ilaç bulunmuyor</div>';
            } else {
                medsContainer.innerHTML = data.todayMedications.map(med => {
                    const isTaken = med.takenToday.length > 0;
                    return `
                        <div class="medication-item">
                            <div class="medication-name">💊 ${med.medicationName}</div>
                            <div class="medication-time">⏰ Saatler: ${med.scheduleTimes.join(', ')}</div>
                            ${med.notes ? `<div class="medication-time">📝 ${med.notes}</div>` : ''}
                            <span class="medication-status ${isTaken ? 'taken' : 'pending'}">
                                ${isTaken ? '✓ Alındı' : '⏳ Bekleniyor'}
                            </span>
                        </div>
                    `;
                }).join('');
            }

            // Bildirimler
            const notifContainer = document.getElementById('notificationsContainer');
            if (data.recentNotifications.length === 0) {
                notifContainer.innerHTML = '<div class="empty-state">Bildirim yok</div>';
            } else {
                notifContainer.innerHTML = data.recentNotifications.map(notif => {
                    const type = notif.type.toLowerCase();
                    return `
                        <div class="notification ${type}">
                            <strong>${notif.title}</strong>
                            <p>${notif.message}</p>
                            <div class="time-stamp">${new Date(notif.createdAt).toLocaleString('tr-TR')}</div>
                        </div>
                    `;
                }).join('');
            }
        }

        function showError(message) {
            const alert = document.getElementById('loginAlert');
            alert.textContent = message;
            alert.style.display = 'block';
        }

        function logout() {
            localStorage.removeItem('familyToken');
            localStorage.removeItem('elderlyId');
            document.getElementById('loginContainer').classList.add('active');
            document.getElementById('dashboardContainer').classList.remove('active');
            document.getElementById('loginForm').reset();
        }

        // Sayfa açılırken kontrol et
        window.addEventListener('load', () => {
            const token = localStorage.getItem('familyToken');
            const eId = localStorage.getItem('elderlyId');
            if (token && eId) {
                familyToken = token;
                elderlyId = eId;
                showDashboard();
            }
        });
    </script>
</body>
</html>
