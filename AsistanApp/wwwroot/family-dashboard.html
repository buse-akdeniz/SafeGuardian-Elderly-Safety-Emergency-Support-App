<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yaşlı Yakınız - Aile Kontrol Paneli</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            max-width: 500px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: none;
        }

        .login-container.active {
            display: block;
        }

        .dashboard-container {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
        }

        .dashboard-container.active {
            display: block;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 36px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 18px;
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #667eea;
            border-radius: 10px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #764ba2;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        .logout-btn {
            background: #ff6b6b;
            margin-top: 20px;
            margin-bottom: 0;
        }

        .back-btn {
            background: #6b7280;
            margin-top: 12px;
            margin-bottom: 0;
        }

        .lang-switcher {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-bottom: 14px;
        }

        .lang-btn {
            width: auto;
            padding: 8px 14px;
            font-size: 14px;
            border-radius: 999px;
            background: #e5e7eb;
            color: #111827;
            font-weight: 700;
        }

        .lang-btn.active {
            background: #2563eb;
            color: #fff;
        }

        /* DASHBOARD STYLES */
        .dashboard-header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .elderly-info h2 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }

        .elderly-info p {
            font-size: 18px;
            color: #666;
            margin: 5px 0;
        }

        .status-badge {
            background: #4ade80;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 700;
        }

        .status-badge.warning {
            background: #fbbf24;
        }

        .status-badge.critical {
            background: #f87171;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .card h3 {
            font-size: 22px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .medication-item {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .medication-name {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .medication-time {
            font-size: 16px;
            color: #666;
        }

        .medication-status {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .medication-status.taken {
            background: #d1fae5;
            color: #065f46;
        }

        .medication-status.pending {
            background: #fef3c7;
            color: #92400e;
        }

        .notification {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            font-size: 15px;
        }

        .notification.info {
            background: #dbeafe;
            color: #1e40af;
        }

        .notification.warning {
            background: #fef3c7;
            color: #92400e;
            border-left-color: #fbbf24;
        }

        .notification.critical {
            background: #fee2e2;
            color: #991b1b;
            border-left-color: #f87171;
        }

        .time-stamp {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 18px;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .alert.error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #f87171;
        }

        .alert.success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #4ade80;
        }

        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- GİRİŞ EKRANI -->
    <div class="login-container active" id="loginContainer">
        <div class="lang-switcher">
            <button type="button" class="lang-btn" id="langTrBtn" onclick="setLang('tr')">TR</button>
            <button type="button" class="lang-btn" id="langEnBtn" onclick="setLang('en')">EN</button>
        </div>
        <h1 id="loginTitle">👨‍👩‍👧 Aile Kontrol Paneli</h1>
        <p id="loginSubtitle" style="text-align: center; color: #666; margin-bottom: 30px; font-size: 16px;">
            Yaşlı yakınızın ilaç alımını ve günlük durumunu buradan takip edebilirsiniz.
        </p>

        <div id="loginAlert" class="alert error" style="display: none;"></div>

        <form id="loginForm">
            <div class="form-group">
                <label id="familyEmailLabel" for="familyEmail">E-Posta (Aile Üyesi)</label>
                <input type="email" id="familyEmail" placeholder="Örn: ali@example.com" required>
            </div>

            <div class="form-group">
                <label id="familyPasswordLabel" for="familyPassword">Şifre</label>
                <input type="password" id="familyPassword" placeholder="••••••" required>
            </div>

            <label style="display: flex; align-items: center; gap: 10px; margin: 15px 0; font-size: 16px; color: #333;">
                <input type="checkbox" id="rememberMe" />
                <span id="rememberMeText">Beni Hatırla</span>
            </label>

            <button type="submit" id="loginSubmitBtn">Giriş Yap</button>

            <button type="button" class="back-btn" id="backHomeBtn" onclick="goHome()">← Ana Ekrana Dön</button>

            <p id="testHint" style="text-align: center; color: #666; margin-top: 20px; font-size: 14px;">
                Destek: support@vitaguard.app
            </p>
        </form>

        <div style="margin-top: 25px; padding-top: 15px; border-top: 1px solid #e5e7eb;">
            <div class="form-group">
                <label id="apiBaseLabel" for="apiBaseInput">API Adresi</label>
                <input type="url" id="apiBaseInput" placeholder="https://api.yasliyakini.com" />
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="button" id="apiBaseSave" style="flex: 1;">Kaydet</button>
                <button type="button" id="apiBaseClear" class="logout-btn" style="flex: 1;">Sıfırla</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD EKRANI -->
    <div class="dashboard-container" id="dashboardContainer">
        <div class="dashboard-header">
            <div class="elderly-info">
                <h2 id="elderlyName">Ayşe Hanım</h2>
                <p><span id="agePrefix">👤 Yaş:</span> <span id="elderlyAge">75</span></p>
                <p><span id="phonePrefix">📞 Tel:</span> <span id="elderlyPhone">+90 555 123 4567</span></p>
            </div>
            <div style="text-align: right;">
                <div id="elderlyStatus" class="status-badge">İyi ✓</div>
                <button class="logout-btn" id="logoutBtn" onclick="logout()">Çıkış Yap</button>
                <button class="back-btn" id="backHomeBtnDash" onclick="goHome()">← Ana Ekrana Dön</button>
            </div>
        </div>

        <!-- İLAÇ TAKIP -->
        <div class="card">
            <h3 id="medicationsTitle">💊 Bugünün İlaçları</h3>
            <div id="medicationsContainer" class="empty-state">
                İlaç yükleniyor...
            </div>
        </div>

        <!-- BİLDİRİMLER -->
        <div class="card">
            <h3 id="notificationsTitle">🔔 Son Bildirimler</h3>
            <div id="notificationsContainer" class="empty-state">
                Bildirim yükleniyor...
            </div>
        </div>
    </div>

    <script src="/js/signalr.min.js"></script>
    <script>
        const I18N = {
            tr: {
                loginTitle: '👨‍👩‍👧 Aile Kontrol Paneli',
                loginSubtitle: 'Yaşlı yakınızın ilaç alımını ve günlük durumunu buradan takip edebilirsiniz.',
                familyEmailLabel: 'E-Posta (Aile Üyesi)',
                familyEmailPlaceholder: 'Örn: ali@example.com',
                familyPasswordLabel: 'Şifre',
                rememberMeText: 'Beni Hatırla',
                loginSubmitBtn: 'Giriş Yap',
                backHomeBtn: '← Ana Ekrana Dön',
                testHint: 'Destek: support@vitaguard.app',
                apiBaseLabel: 'API Adresi',
                apiBaseSave: 'Kaydet',
                apiBaseClear: 'Sıfırla',
                agePrefix: '👤 Yaş:',
                phonePrefix: '📞 Tel:',
                elderlyStatus: 'İyi ✓',
                logoutBtn: 'Çıkış Yap',
                backHomeBtnDash: '← Ana Ekrana Dön',
                medicationsTitle: '💊 Bugünün İlaçları',
                notificationsTitle: '🔔 Son Bildirimler',
                medsLoading: 'İlaç yükleniyor...',
                notifsLoading: 'Bildirim yükleniyor...',
                loginFailed: 'Giriş başarısız. E-posta ve şifrenizi kontrol edin.',
                connectionError: 'Bağlantı hatası',
                dashboardConnWarn: 'Veriler güncellenemiyor. Lütfen internet bağlantınızı kontrol edin.',
                noMedsToday: 'Bugün için ilaç bulunmuyor',
                noNotifications: 'Bildirim yok',
                medsTimes: '⏰ Saatler',
                notes: '📝',
                medTaken: '✓ Alındı',
                medPending: '⏳ Bekleniyor',
                notifTitle: 'Bildirim',
                fallDetected: 'Düşme Algılandı',
                familyAlert: 'Aile Uyarısı',
                emergency: 'Acil Durum',
                liveLocation: 'Canlı konum',
                emergencyBroadcast: 'Acil durum yayını alındı.'
            },
            en: {
                loginTitle: '👨‍👩‍👧 Family Control Panel',
                loginSubtitle: 'Track your elderly relative\'s medications and daily status from here.',
                familyEmailLabel: 'Email (Family Member)',
                familyEmailPlaceholder: 'e.g. ali@example.com',
                familyPasswordLabel: 'Password',
                rememberMeText: 'Remember Me',
                loginSubmitBtn: 'Sign In',
                backHomeBtn: '← Back to Home',
                testHint: 'Support: support@vitaguard.app',
                apiBaseLabel: 'API Address',
                apiBaseSave: 'Save',
                apiBaseClear: 'Reset',
                agePrefix: '👤 Age:',
                phonePrefix: '📞 Phone:',
                elderlyStatus: 'Good ✓',
                logoutBtn: 'Log Out',
                backHomeBtnDash: '← Back to Home',
                medicationsTitle: '💊 Today\'s Medications',
                notificationsTitle: '🔔 Recent Notifications',
                medsLoading: 'Loading medications...',
                notifsLoading: 'Loading notifications...',
                loginFailed: 'Login failed. Please check your email and password.',
                connectionError: 'Connection error',
                dashboardConnWarn: 'Data cannot be refreshed. Please check your internet connection.',
                noMedsToday: 'No medications for today',
                noNotifications: 'No notifications',
                medsTimes: '⏰ Times',
                notes: '📝',
                medTaken: '✓ Taken',
                medPending: '⏳ Pending',
                notifTitle: 'Notification',
                fallDetected: 'Fall Detected',
                familyAlert: 'Family Alert',
                emergency: 'Emergency',
                liveLocation: 'Live location',
                emergencyBroadcast: 'Emergency broadcast received.'
            }
        };

        let currentLang = localStorage.getItem('familyPanelLang') || localStorage.getItem('appLang') || 'tr';
        if (!I18N[currentLang]) currentLang = 'tr';

        function t(key) {
            return (I18N[currentLang] && I18N[currentLang][key]) || key;
        }

        function setLang(lang) {
            if (!I18N[lang]) return;
            currentLang = lang;
            localStorage.setItem('familyPanelLang', lang);
            applyTranslations();
        }

        function applyTranslations() {
            const map = {
                loginTitle: 'loginTitle',
                loginSubtitle: 'loginSubtitle',
                familyEmailLabel: 'familyEmailLabel',
                familyPasswordLabel: 'familyPasswordLabel',
                rememberMeText: 'rememberMeText',
                loginSubmitBtn: 'loginSubmitBtn',
                backHomeBtn: 'backHomeBtn',
                testHint: 'testHint',
                apiBaseLabel: 'apiBaseLabel',
                apiBaseSave: 'apiBaseSave',
                apiBaseClear: 'apiBaseClear',
                agePrefix: 'agePrefix',
                phonePrefix: 'phonePrefix',
                elderlyStatus: 'elderlyStatus',
                logoutBtn: 'logoutBtn',
                backHomeBtnDash: 'backHomeBtnDash',
                medicationsTitle: 'medicationsTitle',
                notificationsTitle: 'notificationsTitle'
            };

            Object.entries(map).forEach(([id, key]) => {
                const el = document.getElementById(id);
                if (el) el.textContent = t(key);
            });

            const emailInput = document.getElementById('familyEmail');
            if (emailInput) emailInput.placeholder = t('familyEmailPlaceholder');

            const medsContainer = document.getElementById('medicationsContainer');
            if (medsContainer && medsContainer.classList.contains('empty-state')) {
                medsContainer.textContent = t('medsLoading');
            }

            const notifContainer = document.getElementById('notificationsContainer');
            if (notifContainer && notifContainer.classList.contains('empty-state')) {
                notifContainer.textContent = t('notifsLoading');
            }

            const trBtn = document.getElementById('langTrBtn');
            const enBtn = document.getElementById('langEnBtn');
            if (trBtn) trBtn.classList.toggle('active', currentLang === 'tr');
            if (enBtn) enBtn.classList.toggle('active', currentLang === 'en');

            document.documentElement.lang = currentLang;
        }

        const DEFAULT_API_BASE = 'https://safeguardian-elderly-safety-emergency-support-ap-production.up.railway.app/api';
        const IOS_SIMULATOR_API_BASE = 'https://safeguardian-elderly-safety-emergency-support-ap-production.up.railway.app/api';

        function normalizeApiBase(value) {
            if (!value || typeof value !== 'string') return '';
            return value.trim().replace(/\/api\/?$/i, '').replace(/\/$/, '');
        }

        function getApiBase() {
            const rawStored = localStorage.getItem('apiBaseUrl')?.trim();
            const rawConfigured = window.API_BASE?.trim?.();
            const protocol = window.location?.protocol || '';
            const origin = window.location?.origin || '';
            const userAgent = navigator.userAgent || '';
            const isHttpOrigin = /^https?:/i.test(protocol) && /^https?:\/\//i.test(origin);
            const isCapacitorRuntime = Boolean(window.Capacitor);
            const isIosSimulator = /(iPhone|iPad|iPod).*Simulator/i.test(userAgent) || /Simulator/i.test(userAgent);

            // Strip any trailing /api so we never end up with /api/api
            const stored = normalizeApiBase(rawStored);
            const configured = normalizeApiBase(rawConfigured);

            // Respect user-defined custom API base, including LAN IPs (e.g. 192.168.x.x)
            if (stored) {
                return `${stored}/api`;
            }

            if (configured) {
                return `${configured}/api`;
            }

            // Capacitor on iOS Simulator usually runs against local backend during development
            if (isCapacitorRuntime && isIosSimulator) {
                return IOS_SIMULATOR_API_BASE;
            }

            // Capacitor WebView (iOS/Android native shell) → always use production
            if (isCapacitorRuntime) {
                return DEFAULT_API_BASE;
            }

            if (isHttpOrigin) {
                return `${origin}/api`;
            }

            return DEFAULT_API_BASE;
        }

        let ACTIVE_API_BASE = getApiBase();
        function getHubUrl(apiBase) {
            return `${apiBase.replace(/\/api$/, '')}/health-hub`;
        }
        let familyToken = null;
        let elderlyId = null;
        let realtimeConnection = null;
        const storage = {
            getItem: (key) => (sessionStorage.getItem(key) ?? localStorage.getItem(key)),
            setItem: (key, value, remember) => (remember ? localStorage : sessionStorage).setItem(key, value),
            removeItem: (key) => { sessionStorage.removeItem(key); localStorage.removeItem(key); }
        };

        const apiBaseInput = document.getElementById('apiBaseInput');
        const apiBaseSave = document.getElementById('apiBaseSave');
        const apiBaseClear = document.getElementById('apiBaseClear');

        if (apiBaseInput) {
            const stored = localStorage.getItem('apiBaseUrl');
            apiBaseInput.value = stored || '';
        }

        if (apiBaseSave && apiBaseInput) {
            apiBaseSave.addEventListener('click', () => {
                const value = apiBaseInput.value.trim();
                if (!value) return;
                localStorage.setItem('apiBaseUrl', value);
                location.reload();
            });
        }

        if (apiBaseClear && apiBaseInput) {
            apiBaseClear.addEventListener('click', () => {
                localStorage.removeItem('apiBaseUrl');
                apiBaseInput.value = '';
                location.reload();
            });
        }

        // GİRİŞ YÖNETIMI
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('familyEmail').value;
            const password = document.getElementById('familyPassword').value;

            try {
                let response;
                try {
                    response = await fetch(`${ACTIVE_API_BASE}/family/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                } catch (primaryError) {
                    if (ACTIVE_API_BASE !== DEFAULT_API_BASE) {
                        response = await fetch(`${DEFAULT_API_BASE}/family/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, password })
                        });
                        ACTIVE_API_BASE = DEFAULT_API_BASE;
                    } else {
                        throw primaryError;
                    }
                }

                if (!response) {
                    throw new Error('No response from login request');
                }

                if (response.ok) {
                    const data = await response.json();
                    const remember = document.getElementById('rememberMe')?.checked;
                    familyToken = data.token;
                    elderlyId = data.caringFor;

                    storage.setItem('familyToken', familyToken, remember);
                    storage.setItem('elderlyId', elderlyId, remember);
                    storage.setItem('apiBaseUrl', ACTIVE_API_BASE.replace(/\/api\/?$/i, ''));
                    
                    showDashboard();
                } else {
                    showError(t('loginFailed'));
                }
            } catch (error) {
                const message = error?.message || String(error);
                console.error('Giriş hatası:', {
                    message,
                    apiBase: ACTIVE_API_BASE,
                    email
                });
                showError(t('connectionError'));
            }
        });

        function showDashboard() {
            document.getElementById('loginContainer').classList.remove('active');
            document.getElementById('dashboardContainer').classList.add('active');
            if (!history.state || history.state.view !== 'dashboard') {
                history.pushState({ view: 'dashboard' }, '', window.location.href);
            }
            markFamilyContact();
            initRealtime();
            loadDashboard();
        }

        async function initRealtime() {
            if (!window.signalR || realtimeConnection || !elderlyId) return;

            realtimeConnection = new signalR.HubConnectionBuilder()
                .withUrl(getHubUrl(ACTIVE_API_BASE))
                .withAutomaticReconnect()
                .build();

            realtimeConnection.on('ReceiveFamilyAlert', (payload) => {
                if (!payload || (payload.elderlyId && payload.elderlyId !== elderlyId)) return;
                prependNotification({
                    type: payload.severity || 'warning',
                    title: payload.title || t('familyAlert'),
                    message: payload.message || (currentLang === 'en' ? 'New alert received.' : 'Yeni uyarı var'),
                    createdAt: payload.timestamp || new Date().toISOString()
                });
                loadDashboard();
            });

            realtimeConnection.on('ReceiveFallDetected', (payload) => {
                if (!payload || (payload.elderlyId && payload.elderlyId !== elderlyId)) return;
                prependNotification({
                    type: 'critical',
                    title: payload.title || t('fallDetected'),
                    message: currentLang === 'en'
                        ? `Fall risk detected for ${payload.elderlyId || elderlyId}.`
                        : `${payload.elderlyId || elderlyId} için düşme riski algılandı.`,
                    createdAt: payload.timestamp || new Date().toISOString()
                });
                loadDashboard();
            });

            realtimeConnection.on('ReceiveEmergencyBroadcast', (payload) => {
                if (!payload || (payload.elderlyId && payload.elderlyId !== elderlyId)) return;
                prependNotification({
                    type: 'critical',
                    title: t('emergency'),
                    message: payload.location ? `${t('liveLocation')}: ${payload.location}` : t('emergencyBroadcast'),
                    createdAt: payload.timestamp || new Date().toISOString()
                });
                loadDashboard();
            });

            realtimeConnection.onclose(() => {
                realtimeConnection = null;
            });

            try {
                await realtimeConnection.start();
                await realtimeConnection.invoke('JoinFamilyGroup', elderlyId);
            } catch (error) {
                console.warn('Gerçek zamanlı bağlantı kurulamadı:', error);
                realtimeConnection = null;
            }
        }

        async function markFamilyContact() {
            if (!familyToken) return;
            try {
                await fetch(`${ACTIVE_API_BASE}/family/contact?token=${familyToken}`, { method: 'POST' });
            } catch (error) {
                console.warn('Aile iletişim kaydı başarısız:', error);
            }
        }

        function showLogin() {
            document.getElementById('loginContainer').classList.add('active');
            document.getElementById('dashboardContainer').classList.remove('active');
        }

        async function loadDashboard() {
            try {
                const response = await fetch(`${ACTIVE_API_BASE}/family/dashboard/${elderlyId}?token=${familyToken}`);
                
                if (response.ok) {
                    const data = await response.json();
                    renderDashboard(data);
                    setDashboardAlert('');
                    
                    // Her 30 saniyede yenile
                    setTimeout(loadDashboard, 30000);
                } else {
                    setDashboardAlert(t('dashboardConnWarn'));
                }
            } catch (error) {
                console.error('Dashboard hatası:', error);
                setDashboardAlert(t('dashboardConnWarn'));
            }
        }

        function setDashboardAlert(message) {
            const container = document.getElementById('dashboardContainer');
            if (!container) return;

            let alert = document.getElementById('dashboardAlert');
            if (!alert) {
                alert = document.createElement('div');
                alert.id = 'dashboardAlert';
                alert.className = 'alert error';
                alert.style.marginBottom = '20px';
                container.prepend(alert);
            }

            if (!message) {
                alert.style.display = 'none';
                alert.textContent = '';
            } else {
                alert.textContent = message;
                alert.style.display = 'block';
            }
        }

        function renderDashboard(data) {
            // Yaşlı bilgileri
            document.getElementById('elderlyName').textContent = data.elderly.name;
            document.getElementById('elderlyAge').textContent = data.elderly.age;
            document.getElementById('elderlyPhone').textContent = data.elderly.phone;

            // İlaçlar
            const medsContainer = document.getElementById('medicationsContainer');
            if (data.todayMedications.length === 0) {
                medsContainer.innerHTML = `<div class="empty-state">${t('noMedsToday')}</div>`;
            } else {
                medsContainer.innerHTML = data.todayMedications.map(med => {
                    const isTaken = med.takenToday.length > 0;
                    return `
                        <div class="medication-item">
                            <div class="medication-name">💊 ${med.medicationName}</div>
                            <div class="medication-time">${t('medsTimes')}: ${med.scheduleTimes.join(', ')}</div>
                            ${med.notes ? `<div class="medication-time">${t('notes')} ${med.notes}</div>` : ''}
                            <span class="medication-status ${isTaken ? 'taken' : 'pending'}">
                                ${isTaken ? t('medTaken') : t('medPending')}
                            </span>
                        </div>
                    `;
                }).join('');
            }

            // Bildirimler
            const notifContainer = document.getElementById('notificationsContainer');
            if (data.recentNotifications.length === 0) {
                notifContainer.innerHTML = `<div class="empty-state">${t('noNotifications')}</div>`;
            } else {
                notifContainer.innerHTML = data.recentNotifications.map(notif => {
                    const type = notif.type.toLowerCase();
                    return `
                        <div class="notification ${type}">
                            <strong>${notif.title}</strong>
                            <p>${notif.message}</p>
                            <div class="time-stamp">${new Date(notif.createdAt).toLocaleString(currentLang === 'en' ? 'en-US' : 'tr-TR')}</div>
                        </div>
                    `;
                }).join('');
            }
        }

        function prependNotification(notif) {
            const notifContainer = document.getElementById('notificationsContainer');
            if (!notifContainer) return;

            const current = notifContainer.classList.contains('empty-state')
                ? []
                : Array.from(notifContainer.querySelectorAll('.notification')).map(node => node.outerHTML);

            const type = String(notif.type || 'info').toLowerCase();
            const entry = `
                <div class="notification ${type}">
                    <strong>${notif.title || t('notifTitle')}</strong>
                    <p>${notif.message || ''}</p>
                    <div class="time-stamp">${new Date(notif.createdAt || Date.now()).toLocaleString(currentLang === 'en' ? 'en-US' : 'tr-TR')}</div>
                </div>
            `;

            notifContainer.classList.remove('empty-state');
            notifContainer.innerHTML = [entry, ...current].slice(0, 8).join('');
        }

        function showError(message) {
            const alert = document.getElementById('loginAlert');
            alert.textContent = message;
            alert.style.display = 'block';
        }

        function logout() {
            if (realtimeConnection) {
                realtimeConnection.stop().catch(() => {});
                realtimeConnection = null;
            }
            storage.removeItem('familyToken');
            storage.removeItem('elderlyId');
            showLogin();
            document.getElementById('loginForm').reset();
            history.replaceState({ view: 'login' }, '', window.location.href);
        }

        function goHome() {
            window.location.href = '/index.html';
        }

        // Sayfa açılırken kontrol et
        window.addEventListener('load', () => {
            applyTranslations();
            if (!history.state) {
                history.replaceState({ view: 'login' }, '', window.location.href);
            }
            const token = storage.getItem('familyToken');
            const eId = storage.getItem('elderlyId');
            if (token && eId) {
                familyToken = token;
                elderlyId = eId;
                showDashboard();
            }
        });

        window.addEventListener('popstate', (event) => {
            const view = event.state?.view;
            if (view === 'dashboard' && storage.getItem('familyToken') && storage.getItem('elderlyId')) {
                showDashboard();
                return;
            }
            showLogin();
        });
    </script>
</body>
</html>
